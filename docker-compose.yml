version: '3.8'

services:
  kali-webui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kali-mcp-webui
    ports:
      - "5055:5055"
    volumes:
      - .:/app
      # Persist session data including keystrokes
      - ./runs:/app/runs
    environment:
      - FLASK_ENV=development
      - PYTHONUNBUFFERED=1
      # Keylogger configuration
      - KEYLOGGER_ENABLED=${KEYLOGGER_ENABLED:-false}
    # Note: System keylogger requires privileged mode or specific device access
    # For Docker, the system keylogger may have limited functionality
    # Browser keylogger works without additional privileges
    # privileged: true  # Uncomment if system keylogging is required in Docker
    restart: unless-stopped
